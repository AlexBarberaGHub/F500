<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F500 - ODF Fiber</title>

    <style>
        :root {
            --fc-blue-dark: #002D72; 
            --fc-blue-light: #0047bb;
            --fiber-blue: #007FFF; 
            --cassetto-green: #22c55e;
            --sc-boot-green: #15803d; 
            --anim-duration: 0.3s; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--fc-blue-dark); 
            display: flex; justify-content: center; 
            min-height: 100vh; margin: 0; 
            overflow-x: hidden; 
        }

        body.no-scroll { overflow: hidden; }

        .card { 
            background: white; width: 94%; max-width: 400px; 
            border-radius: 0 0 20px 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            overflow: hidden; display: flex; flex-direction: column;
            margin-bottom: 20px; align-self: flex-start;
            position: relative;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* --- ANIMAZIONI CATASTROFE --- */
        @keyframes catastrophic-glitch {
            0% { transform: translate(0); clip-path: inset(0 0 0 0); }
            10% { transform: translate(-20px, 15px); filter: invert(1) contrast(2); }
            20% { transform: translate(20px, -15px); clip-path: inset(20% 0 50% 0); }
            30% { transform: translate(-30px, 30px) rotate(5deg); filter: hue-rotate(180deg); }
            50% { transform: scale(1.4) skew(15deg); filter: brightness(3) saturate(10); }
            80% { transform: translate(40px, -10px); clip-path: inset(50% 0 0 0); }
            100% { transform: translate(0); }
        }

        .destroyed-bh { animation: black-hole 1.4s forwards cubic-bezier(0.95, 0.05, 0.795, 0.035); }
        .destroyed-sh { animation: shatter-fall 1.4s forwards ease-in; }
        .destroyed-li { animation: liquid-melt 1.4s forwards ease-in-out; }
        @keyframes black-hole { 100% { transform: scale(0) rotate(2160deg) blur(60px); opacity: 0; } }
        @keyframes shatter-fall { 100% { transform: translateY(1200px) rotate(180deg) scale(0); opacity: 0; } }
        @keyframes liquid-melt { 100% { transform: scale(2, 0) skewX(60deg); opacity: 0; filter: blur(20px); } }

        .destroyed-vortex { animation: vortex-exit 2.5s forwards ease-in; }
        .destroyed-pixel { animation: pixel-dissolve 2.5s forwards steps(10); }
        @keyframes vortex-exit {
            0% { transform: scale(1); filter: hue-rotate(0); }
            50% { transform: scale(2) rotate(-720deg); filter: hue-rotate(360deg) blur(10px); opacity: 0.8; }
            100% { transform: scale(0) rotate(-1440deg); opacity: 0; }
        }
        @keyframes pixel-dissolve {
            0% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
            50% { transform: scale(0.8); filter: brightness(10); clip-path: polygon(20% 20%, 80% 0%, 100% 80%, 0% 100%); }
            100% { transform: scale(0); opacity: 0; clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%); }
        }

        .glitch-active { 
            animation: catastrophic-glitch 0.08s infinite; 
            outline: 30px solid #ff0000; 
            z-index: 9999; 
            box-shadow: 0 0 200px #ff0000, 0 0 100px white inset;
        }

        .header { 
            position: relative; height: 190px; 
            background: linear-gradient(rgba(0, 45, 114, 0.85), rgba(0, 45, 114, 0.95)), 
                        url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding: 10px 20px; box-sizing: border-box;
        }
        .header-main-content { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: -15px; }
        .logo-container-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        @keyframes neon-glitch {
            0%, 15%, 25%, 50%, 75%, 100% { opacity: 1; filter: brightness(1.2); box-shadow: 0 0 10px var(--fiber-blue), 0 0 20px var(--fiber-blue); }
            10%, 20%, 55%, 80% { opacity: 0.2; filter: brightness(0.4); box-shadow: none; }
        }
        @keyframes neon-single-pulse {
            0% { opacity: 1; filter: brightness(1.2); }
            40% { opacity: 0.3; filter: brightness(0.5); box-shadow: none; }
            100% { opacity: 1; filter: brightness(1.2); box-shadow: 0 0 10px var(--fiber-blue), 0 0 20px var(--fiber-blue); }
        }
        /* Animazione respiro ogni 5 secondi */
        @keyframes fiber-breath {
            0%, 100% { filter: brightness(1); box-shadow: 0 0 5px var(--fiber-blue); }
            50% { filter: brightness(1.8); box-shadow: 0 0 20px var(--fiber-blue), 0 0 35px var(--fiber-blue); }
        }
        .fiber-breathing { animation: fiber-breath 5s ease-in-out infinite !important; }

        .fiber-illustration-left, .fiber-illustration-right { display: flex; align-items: center; }
        .neon-init { animation: neon-glitch 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards; }
        .neon-click { animation: neon-single-pulse 1.2s ease-in-out forwards; }
        .connector { display: flex; align-items: center; }
        .ferrule { width: 25px; height: 12px; background: var(--cassetto-green); border-radius: 2px; position: relative; }
        .ferrule::after { content: ""; position: absolute; top: 3px; width: 8px; height: 6px; background: #f8fafc; border-radius: 1px; }
        .connector.left .ferrule::after { left: -6px; }
        .connector.right .ferrule::after { right: -6px; }
        .boot { width: 12px; height: 8px; background: var(--sc-boot-green); border-radius: 1px; }
        .fiber-line-art { width: 50px; height: 4px; background: var(--fiber-blue); }
        .logo-text { font-size: 52px; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 1; }
        .subtitle { font-size: 18px; font-weight: 700; margin: 8px 0 0; text-align: center; }
        
        .header-separator { 
            width: 90%; 
            height: 1px; 
            background: rgba(255,255,255,0.2); 
            margin: 18px auto 4px; 
        }

        .signature { position: absolute; bottom: 8px; left: 15px; right: 15px; font-size: 10px; color: white; line-height: 1.2; }
        .sig-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-brand { font-size: 13px; font-weight: 800; letter-spacing: 0.2px; text-align: left; }
        .sig-details { text-align: right; opacity: 0.9; }

        .content { padding: 20px; } 
        .section-container { margin-bottom: 20px; }
        .label-section { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .label-section::after { content: ""; flex: 1; height: 1px; background: #eee; }
        .input-row { display: flex; gap: 10px; }
        .field { flex: 1; }
        label { display: block; font-size: 12px; color: #475569; margin-bottom: 4px; font-weight: 700; }
        select { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 700; background: #f8fafc; color: var(--fc-blue-dark); -webkit-appearance: none; outline: none; }
        .btn-container { position: relative; overflow: hidden; border-radius: 12px; margin-top: 5px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; color: white; background-color: var(--fc-blue-light); box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s; position: relative; overflow: hidden; }
        button:active { transform: scale(0.96); }
        .ripple { position: absolute; background: rgba(255, 255, 255, 0.4); border-radius: 50%; transform: scale(0); animation: ripple-effect 0.6s linear; pointer-events: none; }
        @keyframes ripple-effect { to { transform: scale(4); opacity: 0; } }

        #result-box { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 16px; 
            background-color: #f8fafc; 
            border: 2px solid #e2e8f0; 
            position: relative; 
            display: none; 
            animation: resultFadeIn 0.5s ease-out forwards;
        }
        @keyframes resultFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #result-box::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background-color: var(--fc-blue-light); border-radius: 16px 0 0 16px; }
        .res-value { font-size: 48px; font-weight: 900; color: var(--fc-blue-dark); display: block; margin: 5px 0; text-align: center; }
        .res-desc { margin-top: 15px; text-align: left; background: #fff; border-radius: 12px; padding: 15px; }
        
        .path-step { display: flex; position: relative; padding-bottom: 25px; align-items: flex-start; }
        .path-step::after { content: ""; position: absolute; left: 19px; top: 38px; bottom: 0; width: 2px; background: #e2e8f0; }
        .path-step:last-child::after { display: none; }

        .step-icon-container { width: 40px; flex-shrink: 0; z-index: 1; display: flex; justify-content: center; position: relative; }
        .step-content { padding-left: 15px; font-size: 15px; color: #334155; line-height: 1.4; flex: 1; }
        .step-content b { color: var(--fc-blue-dark); background: #f1f5f9; padding: 2px 4px; border-radius: 4px; }
        .step-label { font-weight: 800; color: var(--fc-blue-light); text-transform: uppercase; font-size: 12px; display: block; margin-bottom: 2px; }
        
        .pro-tip-box { margin-top: 10px; padding: 15px; background-color: #f0fdf4; border: 1.5px dashed var(--cassetto-green); border-radius: 14px; }
        .pro-tip-box ul { padding-left: 0; list-style: none; margin: 0; }
        .pro-tip-box li { position: relative; padding-left: 20px; margin-bottom: 15px; font-size: 16px; color: #166534; line-height: 1.6; }
        .pro-tip-box li::before { content: "•"; position: absolute; left: 0; font-weight: bold; }
        .pro-tip-title { font-size: 18px; font-weight: 800; color: #166534; margin-bottom: 10px; }

        .cassetto-graphic { width: 32px; height: 20px; border-radius: 4px; border: 2px solid var(--cassetto-green); display: flex; flex-direction: column; justify-content: space-evenly; padding: 2px; box-sizing: border-box; background: white; }
        .cassetto-row { display: flex; justify-content: space-between; }
        .cassetto-dot { width: 3px; height: 3px; background: var(--cassetto-green); border-radius: 50%; }
        
        .anim-icon { width: 40px; fill: none; stroke: var(--fiber-blue); stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
        .standard-icon { height: 40px; background: white; }
        
        .loop-verticale-svg { height: 160px; margin-top: -10px; } 

        .draw-path { stroke-dasharray: 600; stroke-dashoffset: 600; }
        .active .draw-path { animation: flowPath 0.8s ease-out forwards; }
        .arrow-head { fill: var(--fiber-blue); opacity: 0; transform: scale(0); transition: all 0.3s; }
        .active .arrow-head { opacity: 1; transform: scale(0.7); transition-delay: 0.4s; }
        
        @keyframes flowPath { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body onload="document.querySelectorAll('.fiber-illustration-left, .fiber-illustration-right').forEach(el => el.classList.add('fiber-breathing'))">

<div class="card" id="mainCard">
    <div class="header">
        <div class="header-main-content">
            <div class="logo-container-wrapper">
                <div class="fiber-illustration-left connector left"><div class="ferrule"></div><div class="boot"></div><div class="fiber-line-art"></div></div>
                <h1 class="logo-text">F500</h1>
                <div class="fiber-illustration-right connector right"><div class="fiber-line-art"></div><div class="boot"></div><div class="ferrule"></div></div>
            </div>
            <p class="subtitle">Calcolo lunghezza bretelle ottiche ODF</p>
            <div class="header-separator"></div>
        </div>
        
        <div class="signature">
            <div class="sig-row">
                <div class="sig-brand">FiberCop</div>
                <div class="sig-details">
                    by Alessandro Barbera<br>
                    FOL/SIO.Field Force Palermo Ovest
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="section-container">
            <div class="label-section">Partenza</div>
            <div class="input-row">
                <div class="field"><label>Montante</label><select id="mO"><script>for(let i=1;i<=31;i+=2) document.write(`<option value="${i}">${i}</option>`)</script></select></div>
                <div class="field"><label>Livello</label><select id="lO"><option value="6">A</option><option value="5">B</option><option value="4">C</option><option value="3">D</option><option value="2">E</option><option value="1">F</option></select></div>
            </div>
        </div>

        <div class="section-container">
            <div class="label-section">Arrivo</div>
            <div class="input-row">
                <div class="field"><label>Montante</label><select id="mD"><script>for(let i=1;i<=31;i+=2) document.write(`<option value="${i}">${i}</option>`)</script></select></div>
                <div class="field"><label>Livello</label><select id="lD"><option value="6">A</option><option value="5">B</option><option value="4">C</option><option value="3">D</option><option value="2">E</option><option value="1">F</option></select></div>
            </div>
        </div>
        
        <div class="btn-container">
            <button onclick="calcolaReale(event)">Calcola Percorso</button>
        </div>

        <div id="result-box">
            <span style="font-size:12px; font-weight:800; color:#64748b; text-transform:uppercase; display:block; text-align:center;">Lunghezza Netta Necessaria</span>
            <span class="res-value" id="valore"></span>
            <div class="res-desc" id="res-desc"></div>
        </div>
    </div>
</div>

<script>
    let clickCount = 0;
    let apocalypseCount = 0;
    let clickTimer = null;
    let breathTimer = null;

    function getLettera(valore) { return { "6": "A", "5": "B", "4": "C", "3": "D", "2": "E", "1": "F" }[valore]; }
    
    const iconPathCassetto = `<div class="cassetto-graphic"><div class="cassetto-row"><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div></div><div class="cassetto-row"><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div></div></div>`;

    const icons = {
        cassetto: iconPathCassetto,
        turnRight: `<svg class="anim-icon standard-icon" viewBox="0 0 40 40"><path class="draw-path" d="M10,35 Q10,15 30,15" /><path class="arrow-head" d="M25,5 L37,15 L25,25 Z" style="stroke:none; transform-origin: 30px 15px;"/></svg>`,
        turnLeft: `<svg class="anim-icon standard-icon" viewBox="0 0 40 40"><path class="draw-path" d="M30,35 Q30,15 10,15" /><path class="arrow-head" d="M15,5 L3,15 L15,25 Z" style="stroke:none; transform-origin: 10px 15px;"/></svg>`,
        down: `<svg class="anim-icon standard-icon" viewBox="0 0 40 40"><path class="draw-path" d="M20,5 V28" /><path class="arrow-head" d="M10,25 L20,38 L30,25 Z" style="stroke:none; transform-origin: 20px 30px;"/></svg>`,
        uTurn: `<svg class="anim-icon standard-icon" viewBox="0 0 40 40" style="stroke-width: 5.5;"><path class="draw-path" d="M10,5 V25 A10,10 0 0,0 30,25 V10" /><path class="arrow-head" d="M20,15 L30,0 L40,15 Z" style="stroke:none; transform-origin: 30px 10px;"/></svg>`,
        // Centratura perfetta sulla coordinata X=20
        loopVerticale: `<svg class="anim-icon loop-verticale-svg" viewBox="0 0 40 160"><path class="draw-path" d="M12,10 V145 A8,8 0 0,0 20,153 A8,8 0 0,0 28,145 V10 A8,8 0 0,0 20,2 A8,8 0 0,0 12,10" /><path class="arrow-head" d="M10,20 L20,5 L30,20 Z" style="stroke:none; transform-origin: 20px 10px;"/></svg>`
    };

    let loopCounter = 0;
    let animTimer = null;

    function runAnimationSequence() {
        const paths = document.querySelectorAll('.anim-icon');
        paths.forEach(p => p.classList.remove('active'));
        void document.body.offsetWidth;
        let delay = 0;
        paths.forEach((path) => {
            setTimeout(() => { path.classList.add('active'); }, delay);
            delay += 400; 
        });
        loopCounter++;
        if (loopCounter < 2) { animTimer = setTimeout(runAnimationSequence, delay + 500); }
    }

    function triggerDestruction() {
        const card = document.getElementById('mainCard');
        apocalypseCount++;
        let glitchDuration = apocalypseCount === 1 ? 3500 : 7000;
        let exitDuration = apocalypseCount === 1 ? 1400 : 2500;
        let effects1 = ['destroyed-bh', 'destroyed-sh', 'destroyed-li'];
        let effects2 = ['destroyed-vortex', 'destroyed-pixel'];
        let randomEffect = apocalypseCount === 1 ? effects1[Math.floor(Math.random() * effects1.length)] : effects2[Math.floor(Math.random() * effects2.length)];
        document.body.classList.add('no-scroll');
        card.classList.add('glitch-active');
        setTimeout(() => {
            card.classList.remove('glitch-active');
            card.classList.add(randomEffect);
            setTimeout(() => {
                card.classList.remove(randomEffect);
                document.body.classList.remove('no-scroll');
                clickCount = 0;
                card.style.opacity = "0";
                setTimeout(() => {
                    card.style.opacity = "1";
                    card.style.transform = "scale(1) rotate(0)";
                    if (apocalypseCount >= 2) apocalypseCount = 0;
                }, 500);
            }, exitDuration);
        }, glitchDuration); 
    }

    function calcolaReale(event) {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
        if (clickCount >= 5) { triggerDestruction(); return; }

        // Gestione respiro fibre ogni 5 secondi
        const fibers = document.querySelectorAll('.fiber-illustration-left, .fiber-illustration-right');
        fibers.forEach(f => f.classList.remove('fiber-breathing'));
        if(breathTimer) clearTimeout(breathTimer);
        breathTimer = setTimeout(() => {
            fibers.forEach(f => f.classList.add('fiber-breathing'));
        }, 10000);

        const neonElements = document.querySelectorAll('.fiber-illustration-left, .fiber-illustration-right');
        neonElements.forEach(el => {
            el.classList.remove('neon-init', 'neon-click');
            void el.offsetWidth; 
            el.classList.add('neon-click');
        });
        const btn = event.currentTarget;
        const circle = document.createElement("span");
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - btn.getBoundingClientRect().left - diameter/2}px`;
        circle.style.top = `${event.clientY - btn.getBoundingClientRect().top - diameter/2}px`;
        circle.classList.add("ripple");
        btn.appendChild(circle);
        setTimeout(() => circle.remove(), 600);
        if (animTimer) clearTimeout(animTimer);
        loopCounter = 0;
        let m1 = parseInt(document.getElementById('mO').value);
        let l1 = parseInt(document.getElementById('lO').value);
        let m2 = parseInt(document.getElementById('mD').value);
        let l2 = parseInt(document.getElementById('lD').value);
        const coincidenzaLivelli = (l1 === l2);
        let pL = (l1 < l2 || (l1 === l2 && m1 <= m2)) ? {m1, l1, m2, l2} : {m1: m2, l1: l2, m2: m1, l2: l1};
        let iMO = pL.m1, iVO = pL.l1, iMD = pL.m2, iVD = pL.l2;
        const totalereale = (Math.abs(iMD - iMO) * 0.12) + 0.85 + (iVO * 0.32) + (iVD * 0.32) + 1.60;
        document.getElementById('valore').innerText = totalereale.toFixed(2) + " m";
        let titoloMsg = coincidenzaLivelli ? "Indicazioni percorso:" : "Indicazioni percorso (dal cassetto più basso):";
        let html = `<b style="display:block; margin-bottom:15px; color:#334155;">${titoloMsg}</b>`;
        html += `<div class="path-step"><div class="step-icon-container">${icons.cassetto}</div><div class="step-content"><span class="step-label">Partenza:</span>Esci dal cassetto <b>${iMO}-${getLettera(iVO)}</b>.</div></div>`;
        if (iMO !== iMD) {
            html += `<div class="path-step"><div class="step-icon-container">${iMD > iMO ? icons.turnRight : icons.turnLeft}</div><div class="step-content">Vai verso <b>${iMD > iMO ? 'DESTRA' : 'SINISTRA'}</b> al montante <b>${iMD}</b>.</div></div>`;
            html += `<div class="path-step"><div class="step-icon-container">${icons.down}</div><div class="step-content">In <b>${iMD}</b>, scendi alla base.</div></div>`;
        } else {
            html += `<div class="path-step"><div class="step-icon-container">${icons.down}</div><div class="step-content">Nello stesso montante, scendi alla base.</div></div>`;
        }
        html += `<div class="path-step"><div class="step-icon-container">${icons.uTurn}</div><div class="step-content">Dalla base del montante <b>${iMD}</b>, <b>RISALI</b> verso la destinazione.</div></div>`;
        html += `<div class="path-step"><div class="step-icon-container">${icons.cassetto}</div><div class="step-content"><span class="step-label">Arrivo:</span>Entra nel cassetto <b>${iMD}-${getLettera(iVD)}</b>.</div></div>`;
        
        html += `<div class="path-step"><div class="step-icon-container">${icons.loopVerticale}</div><div class="step-content"><span class="step-label">Scorta:</span>Eventuale fibra in eccesso rimasta alla base del montante, recuperala prendendola dalla parte mediale e inseriscila dal basso all'interno del <b>canale centrale di raccolta</b> del montante, salendo fino agli <b>anelli di parcheggio</b>.</div></div>`;

        html += `<div style="padding: 15px; background: #e0f2fe; border-radius: 12px; margin: 10px 0 20px 0; font-weight: 700; color: #0369a1; text-align: center; border: 1px solid #bae6fd;">Lavora a norma e con cura: questo permutatore rappresenta la nostra casa tecnologica.</div>`;
        
        html += `<div class="pro-tip-box"><div class="pro-tip-title">💡 Suggerimenti tecnici:</div><ul><li>💡 <b>PULIZIA:</b> Prima del collegamento, pulisci accuratamente le ferule dei cassetti ottici. Ferule sporche <b>comprometteranno</b> la qualità del segnale e <b>contamineranno</b>, a loro volta, la fibra nuova.</li><li>💡 Etichettare correttamente le due estremità della fibra.</li><li>💡 <b>Pratica due fori sulla busta della fibra</b> (faccia superiore e inferiore). Fai uscire dal foro <b>inferiore</b> il connettore del <b>lato più esterno della matassina</b> per bloccarlo, quindi sfila comodamente l'altro capo (più <b>interno</b>) dal foro <b>superiore</b>: con un po' di fortuna la fibra scorrerà senza annodarsi 😁</li></ul></div>`;
        
        const resBox = document.getElementById('result-box');
