<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F500 - ODF Tool</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F500">
    
    <link rel="icon" type="image/png" sizes="192x192" href="icona.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icona.png">
    <link rel="apple-touch-icon" href="icona.png">

    <style>
        :root {
            /* Blu istituzionale FiberCop */
            --fc-blue-bg: #002D72; 
            --fc-blue-text: #0047bb;
            --fc-dark-blue: #001f4d;
            --fc-gray: #f8fafc;
        }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--fc-blue-bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .card { 
            background: white; width: 92%; max-width: 380px; 
            padding: 0; border-radius: 12px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            background-color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo-box { text-align: center; }
        .logo-text { font-size: 38px; font-weight: 900; color: var(--fc-blue-text); margin: 0; letter-spacing: -1px; }
        .by-alex { font-size: 14px; color: #64748b; margin: 0; font-weight: 500; }

        .content { padding: 25px; }
        
        .section-tag {
            font-size: 11px; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; margin-bottom: 12px;
            display: block; letter-spacing: 1px;
            border-left: 3px solid var(--fc-blue-text); padding-left: 10px;
        }

        .input-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 12px; color: #1e293b; margin-bottom: 6px; font-weight: 700; }
        
        select { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 8px; font-size: 16px; background: #fff;
            color: #1e293b; outline: none; transition: 0.2s;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%230047bb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }
        select:focus { border-color: var(--fc-blue-text); }
        
        button { 
            width: 100%; padding: 18px; background-color: var(--fc-blue-text); 
            color: white; border: none; border-radius: 8px; 
            font-size: 16px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0, 71, 187, 0.2);
        }
        button:active { transform: scale(0.98); background-color: var(--fc-dark-blue); }

        #result-box { 
            margin-top: 25px; padding: 20px; 
            background: var(--fc-gray); border-radius: 10px; 
            text-align: center; display: none;
            border: 1px solid #e2e8f0;
        }
        .res-label { font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .res-value { 
            font-size: 42px; font-weight: 900; color: var(--fc-blue-text); 
            display: block; margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo-box">
            <h1 class="logo-text">F500</h1>
            <p class="by-alex">By Alex</p>
        </div>
    </div>

    <div class="content">
        <span class="section-tag">Permuta Origine</span>
        <div class="input-row">
            <div class="input-group">
                <label>Fila</label>
                <select id="fO">
                    <option>1</option><option>3</option><option>5</option><option>7</option>
                    <option>9</option><option>11</option><option>13</option><option>15</option>
                </select>
            </div>
            <div class="input-group">
                <label>Livello</label>
                <select id="lO">
                    <option value="1">A</option><option value="2">B</option><option value="3">C</option>
                    <option value="4">D</option><option value="5">E</option><option value="6">F</option><option value="7">G</option>
                </select>
            </div>
        </div>

        <span class="section-tag">Permuta Destinazione</span>
        <div class="input-row">
            <div class="input-group">
                <label>Fila</label>
                <select id="fD">
                    <option>1</option><option>3</option><option>5</option><option>7</option>
                    <option>9</option><option>11</option><option>13</option><option>15</option>
                </select>
            </div>
            <div class="input-group">
                <label>Livello</label>
                <select id="lD">
                    <option value="1">A</option><option value="2">B</option><option value="3">C</option>
                    <option value="4">D</option><option value="5">E</option><option value="6">F</option><option value="7">G</option>
                </select>
            </div>
        </div>

        <button onclick="calcola()">Calcola Metratura</button>

        <div id="result-box">
            <span class="res-label">Lunghezza Stimata</span>
            <span class="res-value" id="valore"></span>
        </div>
    </div>
</div>

<script>
    function calcola() {
        const filaO = parseInt(document.getElementById('fO').value);
        const livO = parseInt(document.getElementById('lO').value);
        const filaD = parseInt(document.getElementById('fD').value);
        const livD = parseInt(document.getElementById('lD').value);

        // Calcolo tecnico ODF basato su standard FiberCop
        const vDist = Math.abs(livO - livD) * 0.28;
        const hDist = Math.abs(filaO - filaD) * 0.06 + 0.65;
        const slack = 1.55; 

        const totale = vDist + hDist + slack;

        document.getElementById('valore').innerText = totale.toFixed(2) + " m";
        document.getElementById('result-box').style.display = 'block';
        
        // Effetto scorrimento automatico verso il basso se il risultato è fuori vista
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
