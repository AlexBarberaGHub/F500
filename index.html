<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F500 ODF tool</title>

    <style>
        :root {
            --fc-blue-dark: #002D72; 
            --fc-blue-light: #0047bb;
            --fiber-blue: #007FFF; 
            --cassetto-green: #22c55e;
            --sc-boot-green: #15803d; 
            --anim-duration: 0.3s; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #e0f2fe; 
            display: flex; justify-content: center; 
            min-height: 100vh; margin: 0; 
            padding: 0;
            overflow-x: hidden; 
        }

        body.no-scroll { overflow: hidden; }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            margin: 0; 
            min-height: 100vh;
            align-self: flex-start;
            position: relative;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* --- ANIMAZIONI CATASTROFE --- */
        @keyframes catastrophic-glitch {
            0% { transform: translate(0); clip-path: inset(0 0 0 0); }
            10% { transform: translate(-20px, 15px); filter: invert(1) contrast(2); }
            20% { transform: translate(20px, -15px); clip-path: inset(20% 0 50% 0); }
            30% { transform: translate(-30px, 30px) rotate(5deg); filter: hue-rotate(180deg); }
            50% { transform: scale(1.4) skew(15deg); filter: brightness(3) saturate(10); }
            80% { transform: translate(40px, -10px); clip-path: inset(50% 0 0 0); }
            100% { transform: translate(0); }
        }

        .destroyed-bh { animation: black-hole 1.4s forwards cubic-bezier(0.95, 0.05, 0.795, 0.035); }
        .destroyed-sh { animation: shatter-fall 1.4s forwards ease-in; }
        .destroyed-li { animation: liquid-melt 1.4s forwards ease-in-out; }
        @keyframes black-hole { 100% { transform: scale(0) rotate(2160deg) blur(60px); opacity: 0; } }
        @keyframes shatter-fall { 100% { transform: translateY(1200px) rotate(180deg) scale(0); opacity: 0; } }
        @keyframes liquid-melt { 100% { transform: scale(2, 0) skewX(60deg); opacity: 0; filter: blur(20px); } }

        .destroyed-vortex { animation: vortex-exit 2.5s forwards ease-in; }
        .destroyed-pixel { animation: pixel-dissolve 2.5s forwards steps(10); }
        @keyframes vortex-exit {
            0% { transform: scale(1); filter: hue-rotate(0); }
            50% { transform: scale(2) rotate(-720deg); filter: hue-rotate(360deg) blur(10px); opacity: 0.8; }
            100% { transform: scale(0) rotate(-1440deg); opacity: 0; }
        }
        @keyframes pixel-dissolve {
            0% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
            50% { transform: scale(0.8); filter: brightness(10); clip-path: polygon(20% 20%, 80% 0%, 100% 80%, 0% 100%); }
            100% { transform: scale(0); opacity: 0; clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%); }
        }

        .glitch-active { 
            animation: catastrophic-glitch 0.08s infinite; 
            outline: 30px solid #ff0000; 
            z-index: 9999; 
            box-shadow: 0 0 200px #ff0000, 0 0 100px white inset;
        }

        .header { 
            position: relative; height: 190px; 
            background: linear-gradient(rgba(0, 45, 114, 0.85), rgba(0, 45, 114, 0.95)), 
                        url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding: 10px 20px; box-sizing: border-box;
        }
        .header-main-content { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: -15px; }
        
        .logo-container-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 5px; 
        }
        
        @keyframes fiber-breath {
            0%, 100% { filter: brightness(1); box-shadow: 0 0 5px var(--fiber-blue); }
            50% { filter: brightness(1.8); box-shadow: 0 0 20px var(--fiber-blue), 0 0 35px var(--fiber-blue); }
        }
        .fiber-breathing { animation: fiber-breath 5s ease-in-out infinite !important; }

        .fiber-illustration-left, .fiber-illustration-right { display: flex; align-items: center; }
        .connector { display: flex; align-items: center; }
        .ferrule { width: 25px; height: 12px; background: var(--cassetto-green); border-radius: 2px; position: relative; }
        .ferrule::after { content: ""; position: absolute; top: 3px; width: 8px; height: 6px; background: #f8fafc; border-radius: 1px; }
        .connector.left .ferrule::after { left: -6px; }
        .connector.right .ferrule::after { right: -6px; }
        .boot { width: 12px; height: 8px; background: var(--sc-boot-green); border-radius: 1px; }
        .fiber-line-art { width: 45px; height: 4px; background: var(--fiber-blue); }
        
        .logo-text { 
            font-size: 56px; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -2px; 
            line-height: 1; 
            transform: skewX(-22deg); 
            display: inline-block; 
        }

        .logo-suffix-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 8px;
            padding: 2px 0;
            border-radius: 4px;
            min-width: 50px;
        }

        .logo-suffix {
            font-size: 20px;
            letter-spacing: 0.5px;
            line-height: 0.9;
            padding: 0 6px;
        }
        
        .red-odf { color: #ff0000; font-weight: 900; text-transform: uppercase; }
        .white-tool { color: #ffffff; font-weight: 400; }

        .subtitle { font-size: 18px; font-weight: 400; margin: 8px 0 0; text-align: center; white-space: nowrap; }
        
        .header-separator { 
            width: 90%; 
            height: 1px; 
            background: rgba(255,255,255,0.2); 
            margin: 18px auto 4px; 
        }

        .signature { position: absolute; bottom: 8px; left: 15px; right: 15px; font-size: 10px; color: white; line-height: 1.2; }
        .sig-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-brand { font-size: 13px; font-weight: 800; letter-spacing: 0.2px; text-align: left; }
        .sig-details { text-align: right; opacity: 0.9; }

        .content { padding: 20px; flex: 0; }
        .section-container { margin-bottom: 20px; }
        .label-section { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .label-section::after { content: ""; flex: 1; height: 1px; background: #eee; }
        .input-row { display: flex; gap: 10px; }
        
        .field { flex: 1; }
        label { display: block; font-size: 12px; color: #475569; margin-bottom: 4px; font-weight: 700; text-align: center; }
        
        select { 
            width: 100%; 
            padding: 10px 2px; 
            border: 2px solid #cbd5e1; 
            border-radius: 10px; 
            font-size: 20px; 
            font-weight: 700; 
            background: #f1f5f9; 
            color: var(--fc-blue-dark); 
            -webkit-appearance: none; 
            outline: none; 
            text-align: center; 
            text-align-last: center; 
        }
        
        .btn-container { position: relative; overflow: hidden; border-radius: 12px; margin-top: 5px; background: #f1f5f9; }
        
        #calcBtn { 
            width: 100%; 
            padding: 18px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            color: white; 
            background: rgba(0, 45, 114, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s; 
            position: relative; 
            overflow: hidden; 
        }

        #calcBtn.pulsing::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.4) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            animation: glass-shimmer 4s infinite;
        }

        @keyframes glass-shimmer {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        #calcBtn:active { transform: scale(0.96); background: #002D72; }

        .ripple { position: absolute; background: rgba(255, 255, 255, 0.3); border-radius: 50%; transform: scale(0); animation: ripple-effect 0.6s linear; pointer-events: none; }
        @keyframes ripple-effect { to { transform: scale(4); opacity: 0; } }

        #result-box { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 16px; 
            background-color: #f1f5f9; 
            border: 2px solid #e2e8f0; 
            position: relative; 
            display: none; 
            animation: resultFadeIn 0.5s ease-out forwards;
        }
        @keyframes resultFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #result-box::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background-color: var(--fc-blue-light); border-radius: 16px 0 0 16px; }
        .res-value { font-size: 48px; font-weight: 900; color: var(--fc-blue-dark); display: block; margin: 5px 0; text-align: center; }
        .res-desc { margin-top: 5px; text-align: left; background: #fff; border-radius: 12px; padding: 15px; }
        
        .snake-container { display: flex; justify-content: center; margin: 0; height: 35px; align-items: center; overflow: visible; }
        .fiber-snake { width: 280px; height: 30px; }
        .snake-body { stroke: var(--fiber-blue); stroke-width: 4; fill: none; stroke-linecap: round; stroke-dasharray: 400; stroke-dashoffset: 400; animation: snake-crawl 2s forwards ease-out; }
        @keyframes snake-crawl { 0% { stroke-dashoffset: 400; } 100% { stroke-dashoffset: 0; } }
        
        .path-step { display: flex; position: relative; padding-bottom: 25px; align-items: flex-start; }
        .path-step::after { content: ""; position: absolute; left: 19px; top: 38px; bottom: 0; width: 2px; background: #e2e8f0; }
        .path-step:last-child::after { display: none; }

        .step-icon-container { width: 40px; flex-shrink: 0; z-index: 1; display: flex; justify-content: center; position: relative; }
        .step-content { padding-left: 15px; font-size: 17px; color: #334155; line-height: 1.4; flex: 1; }
        .step-content b { color: var(--fc-blue-dark); background: #f1f5f9; padding: 2px 4px; border-radius: 4px; }
        .step-label { font-weight: 800; color: var(--fc-blue-light); text-transform: uppercase; font-size: 13px; display: block; margin-bottom: 2px; }
        
        .pro-tip-box { margin-top: 10px; padding: 15px; background-color: #f0fdf4; border: 1.5px dashed var(--cassetto-green); border-radius: 14px; }
        .pro-tip-box ul { padding-left: 0; list-style: none; margin: 0; }
        .pro-tip-box li { position: relative; padding-left: 20px; margin-bottom: 15px; font-size: 17px; color: #166534; line-height: 1.6; }
        .pro-tip-box li::before { content: "•"; position: absolute; left: 0; font-weight: bold; }
        .pro-tip-title { font-size: 19px; font-weight: 800; color: #166534; margin-bottom: 10px; }

        .norma-box { padding: 18px; background: #e0f2fe; border-radius: 12px; margin: 10px 0 20px 0; font-weight: 700; color: #0369a1; text-align: center; border: 1px solid #bae6fd; font-size: 18px; line-height: 1.4; }

        .cassetto-graphic { 
            width: 32px; 
            height: 32px; 
            border-radius: 4px; 
            border: 2px solid var(--sc-boot-green); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 1px 0; 
            box-sizing: border-box; 
            background: white; 
            overflow: hidden;
        }
        .cassetto-dot { width: 3.2px; height: 3.2px; background: var(--cassetto-green); border-radius: 50%; }
        .cassetto-row { display: flex; justify-content: space-around; align-items: center; flex: 1; }
        .cassetto-divider { height: 1px; width: 100%; background-color: var(--sc-boot-green); opacity: 0.3; }
        
        .anim-icon { fill: none; stroke: var(--fiber-blue); stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
        
        .icon-reduced { width: 40px !important; height: 40px !important; stroke-width: 2.5 !important; }
        
        .standard-icon { height: 40px; background: white; }
        .loop-verticale-svg { width: 50px; height: 180px !important; margin-top: -5px; margin-bottom: -5px; display: block; } 
        .draw-path { stroke-dasharray: 1000; stroke-dashoffset: 1000; }
        
        .active .draw-path { animation: flowPath 0.8s ease-out forwards; }
        .icon-reduced.active .draw-path { animation: flowPath 1.2s ease-out forwards; }
        .loop-verticale-svg.active .draw-path { animation: flowPath 1.8s ease-out forwards; }
        
        .arrow-head { fill: var(--fiber-blue); opacity: 0; transform: scale(0); transition: all 0.2s; }
        .head-reduced { transform: scale(0.5) !important; }
        .active .head-reduced { transform: scale(0.5) !important; opacity: 1; transition-delay: 0.9s; }
        .loop-verticale-svg.active .arrow-head { opacity: 1; transform: scale(0.9) !important; transition-delay: 1.6s; }
        .head-standard { opacity: 0; transform: scale(0); transition: all 0.2s; }
        .active .head-standard { opacity: 1; transform: scale(0.9) !important; transition-delay: 0.5s; }

        @keyframes flowPath { to { stroke-dashoffset: 0; } }

        /* --- STILE LINK DOWNLOAD E QR CODE --- */
        .footer-link-container {
            text-align: center;
            padding: 40px 0 20px 0; 
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .app-link {
            color: var(--fc-blue-light);
            text-decoration: none;
            font-weight: 700;
            font-size: 10px; 
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 6px 14px; 
            border: 1.5px solid var(--fc-blue-light); 
            border-radius: 20px;
            transition: all 0.3s;
            display: inline-block;
            opacity: 0.8;
        }
        .app-link:hover {
            background: var(--fc-blue-light);
            color: white;
            opacity: 1;
        }
        .qr-wrapper {
            background: #f8fafc;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .qr-wrapper img {
            display: block;
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body onload="initApp()">

<div class="card" id="mainCard">
    <div class="header">
        <div class="header-main-content">
            <div class="logo-container-wrapper">
                <div class="fiber-illustration-left connector left"><div class="ferrule"></div><div class="boot"></div><div class="fiber-line-art"></div></div>

            <div class="input-row">

                <div class="field"><label>Livello</label><select id="lD"><option value="6">A</option><option value="5">B</option><option value="4">C</option><option value="3">D</option><option value="2">E</option><option value="1">F</option></select></div>

            <div class="snake-container">
                <svg class="fiber-snake" viewBox="0 0 280 30">
                    <rect x="0" y="12" width="6" height="6" rx="1" fill="#f8fafc" style="stroke: #cbd5e1; stroke-width: 1.5px;" />
                    <rect x="6" y="9" width="14" height="12" rx="2" fill="var(--cassetto-green)" />

                    <rect x="260" y="9" width="14" height="12" rx="2" fill="var(--cassetto-green)" />
                    <rect x="274" y="12" width="6" height="6" rx="1" fill="#f8fafc" style="stroke: #cbd5e1; stroke-width: 1.5px;" />

            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://alexbarberaghub.github.io/F500/index.html" alt="QR Code Progetto">
        </div>

</div>

<script>
    let clickCount = 0;
    let apocalypseCount = 0;
    let clickTimer = null;

    function initApp() {
        document.querySelectorAll('.fiber-illustration-left, .fiber-illustration-right').forEach(el => el.classList.add('fiber-breathing'));
        const selects = document.querySelectorAll('select');
        selects.forEach(s => {
            s.addEventListener('change', () => {
                document.getElementById('calcBtn').classList.add('pulsing');
                document.getElementById('result-box').style.display = 'none';
                if (animTimer) clearTimeout(animTimer);
            });
        });
    }

    function getLettera(valore) { return { "6": "A", "5": "B", "4": "C", "3": "D", "2": "E", "1": "F" }[valore]; }
    
    const iconPathCassetto = `
        <div class="cassetto-graphic">
            <div class="cassetto-row"><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div></div>
            <div class="cassetto-divider"></div>
            <div class="cassetto-row"><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div></div>
            <div class="cassetto-divider"></div>
            <div class="cassetto-row"><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div></div>
            <div class="cassetto-divider"></div>
            <div class="cassetto-row"><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div><div class="cassetto-dot"></div></div>
        </div>`;

    const icons = {
        cassetto: iconPathCassetto,
        turnRight: `<svg class="anim-icon icon-reduced" viewBox="0 0 40 40"><path class="draw-path" d="M10,35 Q10,15 30,15" /><path class="arrow-head head-reduced" d="M25,5 L37,15 L25,25 Z" style="stroke:none; transform-origin: 30px 15px;"/></svg>`,
        turnLeft: `<svg class="anim-icon icon-reduced" viewBox="0 0 40 40"><path class="draw-path" d="M30,35 Q30,15 10,15" /><path class="arrow-head head-reduced" d="M15,5 L3,15 L15,25 Z" style="stroke:none; transform-origin: 10px 15px;"/></svg>`,
        down: `<svg class="anim-icon icon-reduced" viewBox="0 0 40 40"><path class="draw-path" d="M20,5 V28" /><path class="arrow-head head-reduced" d="M10,25 L20,38 L30,25 Z" style="stroke:none; transform-origin: 20px 30px;"/></svg>`,
        uTurn: `<svg class="anim-icon icon-reduced" viewBox="0 0 40 40"><path class="draw-path" d="M10,5 V25 A10,10 0 0,0 30,25 V10" /><path class="arrow-head head-reduced" d="M20,15 L30,0 L40,15 Z" style="stroke:none; transform-origin: 30px 10px;"/></svg>`,
        loopVerticale: `<svg class="anim-icon loop-verticale-svg" viewBox="0 0 100 250" preserveAspectRatio="xMidYMid meet" style="stroke-linejoin: round; stroke-linecap: round;"><path class="draw-path" d="M15,10 V230 A10,10 0 0,0 35,230 V40 A10,10 0 0,1 55,40 V230 A10,10 0 0,0 75,230 V175 Q75,160 95,160" /><path class="arrow-head head-standard" d="M85,150 L98,160 L85,170 Z" style="stroke:none; transform-origin: 95px 160px;"/></svg>`
    };

    let loopCounter = 0;
    let animTimer = null;

    function runAnimationSequence() {
        const paths = document.querySelectorAll('.anim-icon');
        paths.forEach(p => p.classList.remove('active'));
        void document.body.offsetWidth;
        let delay = 0;
        paths.forEach((path) => {
            setTimeout(() => { path.classList.add('active'); }, delay);
            if (path.classList.contains('icon-reduced')) delay += 600;
            else if (path.classList.contains('loop-verticale-svg')) delay += 1000;
            else delay += 300; 
        });
        loopCounter++;
        if (loopCounter < 2) { animTimer = setTimeout(runAnimationSequence, delay + 400); }
    }

    function triggerDestruction() {
        const card = document.getElementById('mainCard');
        apocalypseCount++;
        let glitchDuration = apocalypseCount === 1 ? 3500 : 7000;
        let exitDuration = apocalypseCount === 1 ? 1400 : 2500;
        let randomEffect = apocalypseCount === 1 ? ['destroyed-bh', 'destroyed-sh', 'destroyed-li'][Math.floor(Math.random() * 3)] : ['destroyed-vortex', 'destroyed-pixel'][Math.floor(Math.random() * 2)];
        document.body.classList.add('no-scroll');
        card.classList.add('glitch-active');
        setTimeout(() => {
            card.classList.remove('glitch-active');
            card.classList.add(randomEffect);
            setTimeout(() => {
                card.classList.remove(randomEffect);
                document.body.classList.remove('no-scroll');
                clickCount = 0;
                card.style.opacity = "0";
                setTimeout(() => {
                    card.style.opacity = "1";
                    card.style.transform = "scale(1) rotate(0)";
                    if (apocalypseCount >= 2) apocalypseCount = 0;
                }, 500);
            }, exitDuration);
        }, glitchDuration); 
    }

    function calcolaOffsetPorta(valorePorta) {
        let index = valorePorta - 1; 
        let colonna = Math.floor(index / 2) % 12; 
        let riga = Math.floor(index / 24); 
        let distH = Math.abs(colonna - 5.5) * 0.041; 
        let distV = Math.abs(riga - 2.5) * 0.083;
        return distH + distV;
    }

    function calcolaReale(event) {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
        if (clickCount >= 5) { triggerDestruction(); return; }

        const btn = document.getElementById('calcBtn');
        btn.classList.remove('pulsing');
        const circle = document.createElement("span");
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - btn.getBoundingClientRect().left - diameter/2}px`;
        circle.style.top = `${event.clientY - btn.getBoundingClientRect().top - diameter/2}px`;
        circle.classList.add("ripple");
        btn.appendChild(circle);
        setTimeout(() => circle.remove(), 600);
        
        if (animTimer) clearTimeout(animTimer);
        loopCounter = 0;
        
        let valPO = parseInt(document.getElementById('pO').value);
        let mO = parseInt(document.getElementById('mO').value);
        let lO = parseInt(document.getElementById('lO').value);
        let pOtxt = document.getElementById('pO').options[document.getElementById('pO').selectedIndex].text;
        
        let valPD = parseInt(document.getElementById('pD').value);
        let mD = parseInt(document.getElementById('mD').value);
        let lD = parseInt(document.getElementById('lD').value);
        let pDtxt = document.getElementById('pD').options[document.getElementById('pD').selectedIndex].text;

        const coincidenzaLivelli = (lO === lD);
        let offsetO = calcolaOffsetPorta(valPO);
        let offsetD = calcolaOffsetPorta(valPD);

        const totalereale = (Math.abs(mD - mO) * 0.12) + 0.85 + (lO * 0.32) + (lD * 0.32) + 1.60 + offsetO + offsetD;
        document.getElementById('valore').innerText = totalereale.toFixed(2) + " m";
        
        function getDettaglioCassetto(portaValue) {
            let index = portaValue - 1; 
            let cassettoNum = Math.floor(index / 24) + 1; 
            let portaSingola = (index % 24) + 1;
            return { num: cassettoNum, singola: portaSingola };
        }

        let dettO = getDettaglioCassetto(valPO);
        let dettD = getDettaglioCassetto(valPD);

        let pL;
        if (lO > lD) pL = {m1: mO, l1: lO, p1: pOtxt, d1: dettO, m2: mD, l2: lD, p2: pDtxt, d2: dettD};
        else if (lD > lO) pL = {m1: mD, l1: lD, p1: pDtxt, d1: dettD, m2: mO, l2: lO, p2: pOtxt, d2: dettO};
        else pL = (mO <= mD) ? {m1: mO, l1: lO, p1: pOtxt, d1: dettO, m2: mD, l2: lD, p2: pDtxt, d2: dettD} : {m1: mD, l1: lD, p1: pDtxt, d1: dettD, m2: mO, l2: lO, p2: pOtxt, d2: dettO};
        
        let iMO = pL.m1, iVO = pL.l1, iPO = pL.p1, iDO = pL.d1, iMD = pL.m2, iVD = pL.l2, iPD = pL.p2, iDD = pL.d2;
        
        const snake = document.querySelector('.snake-body');
        snake.style.animation = 'none';
        void snake.offsetWidth;
        snake.style.animation = 'snake-crawl 2s forwards ease-out';

        let titoloMsg = coincidenzaLivelli ? "<b>Indicazioni percorso:</b>" : "<b>Indicazioni percorso:</b><br><b>(dal cassetto più in alto)</b>:";
        let html = `<span style="display:block; margin-bottom:15px; color:#334155; text-align:center;">${titoloMsg}</span>`;
        
        html += `<div class="path-step"><div class="step-icon-container">${icons.cassetto}</div><div class="step-content"><span class="step-label">Partenza:</span>Esci dal blocco <b>${iMO}-${getLettera(iVO)}-${iPO}</b><br>(Cassetto <b>${iDO.num}</b> porta <b>${iDO.singola}</b>)</div></div>`;
        if (iMO !== iMD) {
            html += `<div class="path-step"><div class="step-icon-container">${icons.turnRight}</div><div class="step-content"><b>VOLTA</b> verso <b>DESTRA</b> al montante <b>${iMD}</b>.</div></div>`;
            html += `<div class="path-step"><div class="step-icon-container">${icons.down}</div><div class="step-content"><b>SCENDI</b> in <b>${iMD}</b> alla base.</div></div>`;
        } else {
            html += `<div class="path-step"><div class="step-icon-container">${icons.down}</div><div class="step-content"><b>SCENDI</b> nello stesso montante alla base.</div></div>`;
        }
        html += `<div class="path-step"><div class="step-icon-container">${icons.uTurn}</div><div class="step-content"><b>RISALI</b> alla base del montante <b>${iMD}</b>, verso la destinazione.</div></div>`;
        html += `<div class="path-step"><div class="step-icon-container">${icons.cassetto}</div><div class="step-content"><span class="step-label">Arrivo:</span>Entra nel blocco <b>${iMD}-${getLettera(iVD)}-${iPD}</b><br>(Cassetto <b>${iDD.num}</b> porta <b>${iDD.singola}</b>)</div></div>`;
        html += `<div class="path-step"><div class="step-icon-container" style="height: 180px;">${icons.loopVerticale}</div><div class="step-content"><span class="step-label">Scorta:</span>Eventuale fibra in eccesso convogliala alla base del montante <b>${iMD}</b>, prendila dalla parte <b>mediale</b> e inseriscila dal basso all'interno del <b>canale centrale di raccolta</b> del montante <b>${iMD}</b>, salendo fino agli <b>anelli di parcheggio di colore bianco</b>.</div></div>`;
        
        html += `<div class="norma-box">Lavora a norma e con cura: questo permutatore rappresenta la nostra casa tecnologica.</div>`;
        html += `<div class="pro-tip-box"><div class="pro-tip-title">💡 Suggerimenti tecnici:</div><ul><li>💡 <b>PULIZIA:</b> Prima del collegamento, <b>PULISCI SEMPRE</b> le ferule dei cassetti ottici con la <b>CLEANING PEN</b>. Ferule sporche <b>comprometteranno</b> la qualità del segnale e <b>contamineranno</b>, a loro volta, la fibra nuova.</li><li>💡 <b>ETICHETTE:</b> Etichettare <b>SEMPRE</b> correttamente le due estremità della fibra.</li></ul></div>`;
        
        const resBox = document.getElementById('result-box');
        resBox.style.display = 'block';
        document.getElementById('res-desc').innerHTML = html;
        setTimeout(runAnimationSequence, 100);
    }
</script>
</body>
</html>
