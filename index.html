<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F500 - ODF Expert</title>

    <style>
        :root {
            --fc-blue-dark: #002D72; 
            --fc-blue-light: #0047bb;
            --fc-orange: #e67e22;
            --apc-green: #28a745;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--fc-blue-dark); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        .card { 
            background: white; width: 95%; max-width: 420px; 
            border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .header { 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 1px solid #eee; 
            background-color: #fafafa;
        }

        /* Container Logo + Testo Ingrandito */
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        /* Connettore SC/APC SVG Ingrandito */
        .sc-apc-icon {
            width: 70px; /* Aumentato da 50px */
            height: auto;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25));
        }

        .logo-text { 
            font-size: 52px; /* Aumentato da 42px */
            font-weight: 900; 
            color: var(--fc-blue-dark); 
            margin: 0; 
            letter-spacing: -2px;
            line-height: 1;
        }
        
        .by-alex { 
            font-size: 15px; 
            color: #64748b; 
            margin-top: 5px;
            font-weight: 700; 
            letter-spacing: 1px; 
        }

        .content { padding: 25px; }
        
        .label-section {
            font-size: 11px; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; margin: 20px 0 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .label-section::after { content: ""; flex: 1; height: 1px; background: #eee; }

        .input-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-group { flex: 1; }
        
        label { display: block; font-size: 12px; color: #475569; margin-bottom: 8px; font-weight: bold; }
        
        select { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; 
            border-radius: 10px; font-size: 18px; outline: none; background: #fff;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 14px;
        }

        .btn-container { display: flex; gap: 12px; margin-top: 25px; }

        button { 
            flex: 1; padding: 20px 5px; border: none; border-radius: 10px; 
            font-size: 14px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-norma { background-color: var(--fc-blue-light); }
        .btn-corto { background-color: var(--fc-orange); }
        
        button:active { transform: scale(0.96); opacity: 0.9; }

        #result-box { 
            margin-top: 25px; padding: 25px; 
            border-radius: 15px; text-align: center; display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .res-label { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .res-value { font-size: 50px; font-weight: 900; display: block; margin: 10px 0; }
        .res-desc { font-size: 13px; line-height: 1.4; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo-wrapper">
            <svg class="sc-apc-icon" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
                <rect x="5" y="10" width="45" height="30" rx="3" fill="#28a745"/>
                <rect x="15" y="10" width="15" height="6" fill="#1e7e34"/>
                <rect x="50" y="15" width="10" height="20" fill="#218838"/>
                <rect x="60" y="20" width="12" height="10" rx="1" fill="#f8f9fa"/>
                <path d="M72 20 L77 25 L72 30 Z" fill="#f8f9fa"/> <rect x="62" y="22" width="6" height="2" fill="#e9ecef"/>
            </svg>
            <h1 class="logo-text">F500</h1>
        </div>
        <p class="by-alex">By Alex</p>
    </div>

    <div class="content">
        <div class="label-section">Posizione Origine</div>
        <div class="input-row">
            <div class="input-group">
                <label>Montante</label>
                <select id="fO">
                    <option>1</option><option>3</option><option>5</option><option>7</option>
                    <option>9</option><option>11</option><option>13</option><option>15</option>
                </select>
            </div>
            <div class="input-group">
                <label>Livello</label>
                <select id="lO">
                    <option value="7">A</option><option value="6">B</option><option value="5">C</option>
                    <option value="4">D</option><option value="3">E</option><option value="2">F</option><option value="1">G</option>
                </select>
            </div>
        </div>

        <div class="label-section">Posizione Destinazione</div>
        <div class="input-row">
            <div class="input-group">
                <label>Montante</label>
                <select id="fD">
                    <option>1</option><option>3</option><option>5</option><option>7</option>
                    <option>9</option><option>11</option><option>13</option><option>15</option>
                </select>
            </div>
            <div class="input-group">
                <label>Livello</label>
                <select id="lD">
                    <option value="7">A</option><option value="6">B</option><option value="5">C</option>
                    <option value="4">D</option><option value="3">E</option><option value="2">F</option><option value="1">G</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-norma" onclick="calcola('norma')">A Norma</button>
            <button class="btn-corto" onclick="calcola('corto')">Percorso Corto</button>
        </div>

        <div id="result-box">
            <span class="res-label" id="res-title"></span>
            <span class="res-value" id="valore"></span>
            <p class="res-desc" id="res-desc"></p>
        </div>
    </div>
</div>

<script>
    function calcola(tipo) {
        const fO = parseInt(document.getElementById('fO').value);
        const lO = parseInt(document.getElementById('lO').value);
        const fD = parseInt(document.getElementById('fD').value);
        const lD = parseInt(document.getElementById('lD').value);
        
        const box = document.getElementById('result-box');
        const vVal = document.getElementById('valore');
        const vTitle = document.getElementById('res-title');
        const vDesc = document.getElementById('res-desc');

        let totale = 0;

        if (tipo === 'norma') {
            const altezzaCielo = 8; 
            const risalita = (altezzaCielo - lO) * 0.30;
            const orizzontale = Math.abs(fO - fD) * 0.10 + 0.85;
            const discesa = (altezzaCielo - lD) * 0.30;
            const slack = 1.60;
            totale = risalita + orizzontale + discesa + slack;

            box.style.backgroundColor = "#eef4ff";
            box.style.border = "1px solid #0047bb";
            vVal.style.color = "#0047bb";
            vTitle.innerText = "Bretella a Norma (Cielo)";
            vDesc.innerText = "Percorso via montante superiore (cielo). Misura certificata.";
        } else {
            const vDist = Math.abs(lO - lD) * 0.28;
            const hDist = Math.abs(fO - fD) * 0.08 + 0.60;
            const slack = 1.40;
            totale = vDist + hDist + slack;

            box.style.backgroundColor = "#fff4eb";
            box.style.border = "1px solid #e67e22";
            vVal.style.color = "#e67e22";
            vTitle.innerText = "Percorso Corto (Diretto)";
            vDesc.innerText = "Distanza minima calcolata per risparmio bretella.";
        }

        vVal.innerText = totale.toFixed(2) + " m";
        box.style.display = 'block';
    }
</script>

</body>
</html>
