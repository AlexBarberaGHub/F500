<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F500 - ODF Expert</title>

    <link rel="apple-touch-icon" href="icona.png">
    <link rel="icon" type="image/png" href="icona.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --fc-blue-dark: #002D72; 
            --fc-blue-light: #0047bb;
            --fc-orange: #e67e22;
            --header-bg-blue: #e0f0f9; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--fc-blue-dark); 
            display: flex; justify-content: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden; 
        }

        .card { 
            background: white; width: 94%; max-width: 400px; 
            border-radius: 16px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            overflow: hidden; display: flex; flex-direction: column;
            margin-top: 30px; margin-bottom: 30px; align-self: flex-start;
        }

        .header { 
            padding: 25px 10px 35px; text-align: center; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            background-color: var(--header-bg-blue);
            position: relative; 
            overflow: hidden;
        }

        .header-dc-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=800&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            opacity: 0.35; 
            z-index: 0;
            -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
        }

        .logo-wrapper {
            display: flex; align-items: center; justify-content: center;
            position: relative;
            z-index: 2; 
            height: 60px;
        }

        .cable-left, .cable-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 4px;
            background-color: var(--fc-blue-dark);
            z-index: 1;
            border-radius: 2px;
        }

        .cable-left { left: 35px; width: 85px; }
        .cable-right { right: 35px; width: 85px; }

        .sc-apc-icon {
            width: 50px; height: auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            position: relative; 
            z-index: 3; 
        }

        .icon-left { position: absolute; left: 0; }
        .icon-right { position: absolute; right: 0; }

        .logo-text { 
            font-size: 38px; font-weight: 900; color: var(--fc-blue-dark); 
            margin: 0; letter-spacing: -1.5px; line-height: 1;
            position: relative; z-index: 3; 
            padding: 0 15px; 
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
        
        .by-alex { 
            font-size: 13px; color: #1e293b; margin-top: 2px; 
            font-weight: 800; letter-spacing: 1px; 
            position: relative; z-index: 2;
            text-shadow: 0 0 5px white;
        }

        .subtitle {
            font-size: 16px;
            color: var(--fc-blue-dark);
            font-weight: 700;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 4px white;
            margin-top: 12px; 
        }

        .content { padding: 15px 20px; } 

        .label-section { 
            font-size: 11px; font-weight: 800; color: #94a3b8; 
            text-transform: uppercase; margin: 12px 0 8px; 
            display: flex; align-items: center; gap: 8px; 
        }
        .label-section::after { content: ""; flex: 1; height: 1px; background: #eee; }

        .input-row { display: flex; gap: 12px; margin-bottom: 12px; }
        
        label { 
            display: block; 
            font-size: 14px; 
            color: #334155; 
            margin-bottom: 6px; 
            font-weight: 700; 
        }
        
        select { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 10px; font-size: 18px; font-weight: 600; 
            outline: none; background: #fff; -webkit-appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); 
            background-repeat: no-repeat; background-position: right 10px center; background-size: 14px; 
        }

        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 16px 5px; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; color: white; transition: 0.2s; }
        .btn-norma { background-color: var(--fc-blue-light); }
        .btn-corto { background-color: var(--fc-orange); }
        button:active { transform: scale(0.96); opacity: 0.8; }
        
        #result-box { margin-top: 15px; padding: 15px; border-radius: 14px; text-align: center; display: none; }
        .res-label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #475569; }
        .res-value { font-size: 42px; font-weight: 900; display: block; margin: 4px 0; }
        .res-desc { font-size: 12px; line-height: 1.4; font-weight: 500; color: #334155; text-align: left; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="header-dc-bg"></div>
        <div class="logo-wrapper">
            <div class="cable-left"></div>
            
            <svg class="sc-apc-icon icon-left" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
                <rect x="30" y="10" width="45" height="30" rx="3" fill="#28a745"/>
                <rect x="50" y="10" width="15" height="6" fill="#1e7e34"/>
                <rect x="20" y="15" width="10" height="20" fill="#218838"/>
                <rect x="8" y="20" width="12" height="10" rx="1" fill="#f8f9fa"/>
                <path d="M8 20 L3 25 L8 30 Z" fill="#f8f9fa"/>
            </svg>

            <h1 class="logo-text">F500</h1>

            <svg class="sc-apc-icon icon-right" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
                <rect x="5" y="10" width="45" height="30" rx="3" fill="#28a745"/>
                <rect x="15" y="10" width="15" height="6" fill="#1e7e34"/>
                <rect x="50" y="15" width="10" height="20" fill="#218838"/>
                <rect x="60" y="20" width="12" height="10" rx="1" fill="#f8f9fa"/>
                <path d="M72 20 L77 25 L72 30 Z" fill="#f8f9fa"/>
            </svg>

            <div class="cable-right"></div>
        </div>
        <p class="by-alex">By AlexB</p>
        <p class="subtitle">Calcolo lunghezze bretelle ottiche</p>
    </div>

    <div class="content">
        <div class="label-section">Origine</div>
        <div class="input-row">
            <div style="flex:1">
                <label>Montante</label>
                <select id="fO">
                    <option>1</option><option>3</option><option>5</option><option>7</option>
                    <option>9</option><option>11</option><option>13</option><option>15</option>
                    <option>17</option><option>19</option><option>21</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Livello</label>
                <select id="lO">
                    <option value="13">A</option><option value="12">B</option><option value="11">C</option>
                    <option value="10">D</option><option value="9">E</option><option value="8">F</option>
                    <option value="7">G</option><option value="6">H</option><option value="5">I</option>
                    <option value="4">J</option><option value="3">K</option><option value="2">L</option><option value="1">M</option>
                </select>
            </div>
        </div>

        <div class="label-section">Destinazione</div>
        <div class="input-row">
            <div style="flex:1">
                <label>Montante</label>
                <select id="fD">
                    <option>1</option><option>3</option><option>5</option><option>7</option>
                    <option>9</option><option>11</option><option>13</option><option>15</option>
                    <option>17</option><option>19</option><option>21</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Livello</label>
                <select id="lD">
                    <option value="13">A</option><option value="12">B</option><option value="11">C</option>
                    <option value="10">D</option><option value="9">E</option><option value="8">F</option>
                    <option value="7">G</option><option value="6">H</option><option value="5">I</option>
                    <option value="4">J</option><option value="3">K</option><option value="2">L</option><option value="1">M</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-norma" onclick="calcola('norma')">A Norma</button>
            <button class="btn-corto" onclick="calcola('corto')">Corto</button>
        </div>

        <div id="result-box">
            <span class="res-label" id="res-title"></span>
            <span class="res-value" id="valore"></span>
            <div class="res-desc" id="res-desc"></div>
        </div>
    </div>
</div>

<script>
    function calcola(tipo) {
        const fO = parseInt(document.getElementById('fO').value);
        const lO = parseInt(document.getElementById('lO').value);
        const fD = parseInt(document.getElementById('fD').value);
        const lD = parseInt(document.getElementById('lD').value);
        const box = document.getElementById('result-box');
        const vVal = document.getElementById('valore');
        const vTitle = document.getElementById('res-title');
        const vDesc = document.getElementById('res-desc');

        let totale = 0;
        if (tipo === 'norma') {
            const altezzaCielo = 14; 
            totale = ((altezzaCielo - lO) * 0.30) + (Math.abs(fO - fD) * 0.10 + 0.85) + ((altezzaCielo - lD) * 0.30) + 1.60;
            box.style.backgroundColor = "#eef4ff";
            vTitle.innerText = "Norma (Via Cielo)";
            vVal.style.color = "var(--fc-blue-light)";
            vDesc.innerHTML = "<b>Procedura:</b> Sali verticalmente fino alla guida superiore (cielo), attraversa orizzontalmente fino al montante di destinazione e scendi fino al livello corretto.";
        } else {
            totale = (Math.abs(lO - lD) * 0.28) + (Math.abs(fO - fD) * 0.08 + 0.60) + 1.40;
            box.style.backgroundColor = "#fff4eb";
            vTitle.innerText = "Percorso Corto";
            vVal.style.color = "var(--fc-orange)";
            vDesc.innerHTML = "<b>Procedura:</b> Passaggio diretto tramite i pettini di permutazione laterali. Ideale per minimizzare l'ingombro dei cavi tra moduli vicini.";
        }
        vVal.innerText = totale.toFixed(2) + " m";
        box.style.display = 'block';
    }
</script>

</body>
</html>
