<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F500 - ODF Fiber</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002D72">
    <link rel="apple-touch-icon" href="icona.png">
    <link rel="icon" type="image/png" href="icona.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --fc-blue-dark: #002D72; 
            --fc-blue-light: #0047bb;
            --header-bg-blue: #e0f0f9; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: var(--fc-blue-dark); 
            display: flex; justify-content: center; 
            min-height: 100vh; margin: 0; overflow-x: hidden; 
        }

        .card { 
            background: white; width: 94%; max-width: 400px; 
            border-radius: 16px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            overflow: hidden; display: flex; flex-direction: column;
            margin-top: 8px; 
            margin-bottom: 20px; align-self: flex-start;
        }

        .header { 
            padding: 20px 10px 0px; 
            text-align: center; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            background-color: var(--header-bg-blue);
            position: relative; overflow: hidden;
        }

        .header-dc-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=800&auto=format&fit=crop");
            background-size: cover; background-position: center; opacity: 0.35; z-index: 0;
            -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
        }

        .logo-wrapper {
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 2; height: 60px;
        }

        .cable-left, .cable-right {
            position: absolute; top: 50%; transform: translateY(-50%);
            height: 4px; background-color: var(--fc-blue-light);
            z-index: 1; border-radius: 2px;
        }
        .cable-left { left: 45px; width: 75px; }
        .cable-right { right: 45px; width: 75px; }

        .sc-apc-icon {
            width: 58px; height: auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            position: relative; z-index: 3; 
        }
        .icon-left { position: absolute; left: 0; }
        .icon-right { position: absolute; right: 0; }

        .logo-text { font-size: 38px; font-weight: 900; color: var(--fc-blue-dark); margin: 0; letter-spacing: -1.5px; position: relative; z-index: 3; padding: 0 15px; }
        
        .subtitle-container {
            position: relative;
            z-index: 2;
            margin-top: 10px;
            margin-bottom: 25px; 
            padding: 0 20px;
        }

        .subtitle { 
            font-size: 17px; 
            color: var(--fc-blue-dark); 
            font-weight: 700; 
            margin: 0;
            text-align: center;
        }

        .signature {
            font-size: 10px;
            color: #64748b; 
            font-weight: 600;
            text-align: right;
            margin-top: 8px; 
            display: block;
            line-height: 1.3;
        }

        .content { padding: 15px 20px; } 
        .label-section { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin: 10px 0 6px; display: flex; align-items: center; gap: 8px; }
        .label-section::after { content: ""; flex: 1; height: 1px; background: #eee; }

        .input-row { display: flex; gap: 12px; margin-bottom: 10px; }
        label { display: block; font-size: 14px; color: #334155; margin-bottom: 4px; font-weight: 700; }
        
        select { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 10px; font-size: 18px; font-weight: 600; outline: none;
            background: #fff url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E") no-repeat right 10px center;
            background-size: 14px; -webkit-appearance: none;
        }

        .btn-container { margin-top: 10px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; color: white; background-color: var(--fc-blue-light); transition: 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.9; }
        
        #result-box { margin-top: 15px; padding: 15px; border-radius: 14px; text-align: center; display: none; background-color: #f8fafc; border: 2px solid #e2e8f0; }
        .res-label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #64748b; }
        .res-value { font-size: 42px; font-weight: 900; color: var(--fc-blue-dark); display: block; margin: 5px 0; }
        
        .res-desc { 
            font-size: 15px; 
            line-height: 1.5; 
            font-weight: 500; 
            color: #475569; 
            margin-top: 10px; 
            text-align: left; 
            padding: 12px; 
            background: #fff; 
            border-radius: 8px; 
            border-left: 4px solid var(--fc-blue-light); 
        }
        
        .path-step { display: block; margin-bottom: 6px; }
        
        .path-note { 
            margin-top: 10px; 
            font-style: italic; 
            color: var(--fc-blue-light); 
            font-weight: 600; 
            font-size: 14px; 
        }

        .pro-tip {
            margin-top: 15px;
            padding: 12px;
            background-color: #f0fdf4;
            border: 1px dashed #22c55e;
            border-radius: 10px;
            font-size: 13px;
            color: #166534;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="header-dc-bg"></div>
        <div class="logo-wrapper">
            <div class="cable-left"></div>
            <svg class="sc-apc-icon icon-left" viewBox="0 0 130 55" xmlns="http://www.w3.org/2000/svg">
                <rect x="55" y="11" width="44" height="33" rx="3.3" fill="#28a745"/>
                <rect x="77" y="11" width="16.5" height="6.6" fill="#1e7e34"/>
                <rect x="44" y="16.5" width="11" height="22" fill="#218838"/>
                <rect x="30.8" y="22" width="13.2" height="11" rx="1.1" fill="#f8f9fa"/>
                <path d="M30.8 22 L25.3 27.5 L30.8 33 Z" fill="#f8f9fa"/>
                <path d="M99 16.5 L129.8 24.2 L129.8 30.8 L99 38.5 Z" fill="#1e7e34" stroke="#ced4da" stroke-width="0.55"/>
            </svg>
            <h1 class="logo-text">F500</h1>
            <svg class="sc-apc-icon icon-right" viewBox="0 0 130 55" xmlns="http://www.w3.org/2000/svg">
                <rect x="31" y="11" width="44" height="33" rx="3.3" fill="#28a745"/>
                <rect x="44" y="11" width="16.5" height="6.6" fill="#1e7e34"/>
                <rect x="77" y="16.5" width="11" height="22" fill="#218838"/>
                <rect x="88" y="22" width="13.2" height="11" rx="1.1" fill="#f8f9fa"/>
                <path d="M101.2 22 L106.7 27.5 L101.2 33 Z" fill="#f8f9fa"/>
                <path d="M31 16.5 L0.2 24.2 L0.2 30.8 L31 38.5 Z" fill="#1e7e34" stroke="#ced4da" stroke-width="0.55"/>
            </svg>
            <div class="cable-right"></div>
        </div>
        <div class="subtitle-container">
            <p class="subtitle">Calcolo lunghezza bretelle ottiche ODF</p>
            <div class="signature">
                by Alessandro Barbera<br>
                FOL/SIO.Field Force Palermo Ovest
            </div>
        </div>
    </div>

    <div class="content">
        <div class="label-section">Partenza</div>
        <div class="input-row">
            <div style="flex:1">
                <label>Montante</label>
                <select id="mO"><script>for(let i=1;i<=31;i+=2) document.write(`<option value="${i}">${i}</option>`)</script></select>
            </div>
            <div style="flex:1">
                <label>Livello</label>
                <select id="lO">
                    <option value="6">A</option><option value="5">B</option><option value="4">C</option>
                    <option value="3">D</option><option value="2">E</option><option value="1">F</option>
                </select>
            </div>
        </div>

        <div class="label-section">Arrivo</div>
        <div class="input-row">
            <div style="flex:1">
                <label>Montante</label>
                <select id="mD"><script>for(let i=1;i<=31;i+=2) document.write(`<option value="${i}">${i}</option>`)</script></select>
            </div>
            <div style="flex:1">
                <label>Livello</label>
                <select id="lD">
                    <option value="6">A</option><option value="5">B</option><option value="4">C</option>
                    <option value="3">D</option><option value="2">E</option><option value="1">F</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button onclick="calcolaReale()">Calcola Percorso</button>
        </div>

        <div id="result-box">
            <span class="res-label">Lunghezza Netta Necessaria</span>
            <span class="res-value" id="valore"></span>
            <div class="res-desc" id="res-desc"></div>
        </div>
    </div>
</div>

<script>
    function getLettera(valore) {
        const mapping = { "6": "A", "5": "B", "4": "C", "3": "D", "2": "E", "1": "F" };
        return mapping[valore];
    }

    function calcolaReale() {
        const inputMO = parseInt(document.getElementById('mO').value);
        const inputVO = parseInt(document.getElementById('lO').value);
        const inputMD = parseInt(document.getElementById('mD').value);
        const inputVD = parseInt(document.getElementById('lD').value);
        
        let mO, vO, mD, vD, titolo;

        if (inputVO !== inputVD) {
            if (inputVO < inputVD) {
                mO = inputMO; vO = inputVO; mD = inputMD; vD = inputVD;
            } else {
                mO = inputMD; vO = inputVD; mD = inputMO; vD = inputVO;
            }
            titolo = "Indicazioni percorso (dal cassetto più basso):";
        } else {
            mO = inputMO; vO = inputVO; mD = inputMD; vD = inputVD;
            titolo = "Indicazioni percorso:";
        }

        const letteraO = getLettera(vO);
        const letteraD = getLettera(vD);

        const distOrizzontale = (Math.abs(inputMD - inputMO) * 0.12) + 0.85; 
        const distVerticale = (inputVO * 0.32) + (inputVD * 0.32);
        const riserva = 1.60;
        const totalereale = distOrizzontale + distVerticale + riserva;

        document.getElementById('valore').innerText = totalereale.toFixed(2) + " m";

        const d = mD - mO; 
        let direzione = d > 0 ? "verso DESTRA" : d < 0 ? "verso SINISTRA" : "stesso montante";

        let htmlPercorso = `<b>${titolo}</b><br><br>`;
        htmlPercorso += `<span class="path-step">1. Esci dal cassetto <b>${mO}-${letteraO}</b>.</span>`;
        
        if (mO !== mD) {
            htmlPercorso += `<span class="path-step">2. Vai ${direzione} fino al montante <b>${mD}</b>.</span>`;
            htmlPercorso += `<span class="path-step">3. In <b>${mD}</b>, scendi alla base.</span>`;
        } else {
            htmlPercorso += `<span class="path-step">2. Nello stesso montante, scendi alla base.</span>`;
        }

        htmlPercorso += `<span class="path-step">4. Dalla base del montante <b>${mD}</b>, <b>RISALI</b> al cassetto <b>${letteraD}</b>.</span>`;
        
        htmlPercorso += `<div class="path-note">Eventuale fibra in eccesso rimasta alla base del montante, recuperala prendendola dalla parte mediale e inseriscila dal basso all'interno del <b>canale centrale di raccolta</b> del montante, fino agli <b>anelli di parcheggio.</b></div>`;
        
        htmlPercorso += `<div class="pro-tip"><b>💡 Suggerimento tecnico:</b> Pratica due fori sulla busta della fibra, uno sulla faccia superiore e uno sulla faccia inferiore. Fai uscire un connettore da un foro, poggia il sacchetto a terra e sfila la fibra dall'altro foro; in questo modo eviterai grovigli durante la posa.</div>`;

        document.getElementById('res-desc').innerHTML = htmlPercorso;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
